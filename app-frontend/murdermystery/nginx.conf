server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Health check endpoint for Cloud Run
  location /healthz {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
  }

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml+rss text/xml;
  gzip_min_length 512;

  # Cache hashed assets aggressively (Vite generates hashed filenames)
  location ~* "^/assets/.*\.[a-f0-9]{8,}\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$" {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    access_log off;
  }

  # Don't cache HTML and other non-hashed assets
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Pragma "no-cache";
    expires 0;
  }
}
